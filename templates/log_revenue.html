<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Revenue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Log Revenue</h1>
        <form action="{{ url_for('main.log_revenue') }}" method="post" class="mt-4">
            <div class="form-group">
                <label for="project_name">Project Name</label>
                <input type="text" class="form-control" name="project_name" required>
            </div>
            <div class="form-group">
                <label for="total_estimate">Total Estimate</label>
                <input type="number" class="form-control" name="total_estimate" required>
            </div>
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="text" class="form-control" name="user_id" required>
            </div>
            <button type="submit" class="btn btn-success">Log Revenue</button>
            <a href="{{ url_for('main.home') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
