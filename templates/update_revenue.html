<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Revenue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Update Revenue</h1>
        <form method="POST" action="">
            {{ form.hidden_tag() }}
            
            <div class="form-group">
                <label for="project_name">{{ form.project_name.label }}</label>
                {{ form.project_name(class="form-control", size=32) }}
            </div>
            
            <div class="form-group">
                <label for="total_estimate">{{ form.total_estimate.label }}</label>
                {{ form.total_estimate(class="form-control", size=32) }}
            </div>
            
            <div class="form-group">
                <label for="user_id">{{ form.user_id.label }}</label>
                {{ form.user_id(class="form-control", size=32) }}
            </div>
            
            <button type="submit" class="btn btn-primary">Update Revenue</button>
            <a href="{{ url_for('list_revenue') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
