<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Revenues</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">List of Revenues</h1>
        <table class="table mt-4">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Project Name</th>
                    <th>Total Estimate</th>
                    <th>User ID</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for revenue in revenues %}
                <tr>
                    <td>{{ revenue.id }}</td>
                    <td>{{ revenue.project_name }}</td>
                    <td>{{ revenue.total_estimate }}</td>
                    <td>{{ revenue.user_id }}</td>
                    <td>
                        <a href="{{ url_for('main.update_revenue', id=revenue.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
</body>
</html>
