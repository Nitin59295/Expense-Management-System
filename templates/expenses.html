<!-- templates/expenses.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Expenses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Log Your Expenses</h1>
        <form method="POST" action="/log_expense">
            <div class="form-group">
                <label for="expense_type">Expense Type</label>
                <input type="text" class="form-control" id="expense_type" name="expense_type" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" class="form-control" id="quantity" name="quantity" required>
            </div>
            <div class="form-group">
                <label for="item_name">Item Name</label>
                <input type="text" class="form-control" id="item_name" name="item_name" required>
            </div>
            <div class="form-group">
                <label for="unit_price">Unit Price</label>
                <input type="number" class="form-control" id="unit_price" name="unit_price" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="gst_amount">GST Amount</label>
                <input type="number" class="form-control" id="gst_amount" name="gst_amount" step="0.01" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit Expense</button>
        </form>
    </div>
</body>
</html>
