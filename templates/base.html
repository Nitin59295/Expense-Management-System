<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Management{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Expense Management System</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('log_expense') }}">Log Expense</a></li>
                <li><a href="{{ url_for('log_revenue') }}">Log Revenue</a></li>
                <li><a href="{{ url_for('list_expenses') }}">View Expenses</a></li>
                <li><a href="{{ url_for('list_revenues') }}">View Revenues</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2024 Expense Management</p>
    </footer>
</body>
</html>
