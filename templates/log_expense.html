<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1>Log Expense</h1>
        <form action="{{ url_for('main.log_expense') }}" method="post" class="mt-4">
            <div class="form-group">
                <label for="expense_type">Expense Type</label>
                <input type="text" class="form-control" name="expense_type" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" class="form-control" name="quantity" required>
            </div>
            <div class="form-group">
                <label for="item_name">Item Name</label>
                <input type="text" class="form-control" name="item_name" required>
            </div>
            <div class="form-group">
                <label for="unit_price">Unit Price</label>
                <input type="number" class="form-control" name="unit_price" required>
            </div>
            <div class="form-group">
                <label for="invoice_number">Invoice Number</label>
                <input type="text" class="form-control" name="invoice_number" required>
            </div>
            <div class="form-group">
                <label for="seller_gstn">Seller GSTN</label>
                <input type="text" class="form-control" name="seller_gstn">
            </div>
            <div class="form-group">
                <label for="gst_amount">GST Amount</label>
                <input type="number" class="form-control" name="gst_amount">
            </div>
            <div class="form-group">
                <label for="total_amount">Total Amount</label>
                <input type="number" class="form-control" name="total_amount" required>
            </div>
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="number" class="form-control" name="user_id" required>
            </div>
            <div class="form-group">
                <label for="designation">Designation</label>
                <input type="text" class="form-control" name="designation">
            </div>
            <div class="form-group">
                <label for="update_flag">Update Flag</label>
                <input type="checkbox" name="update_flag">
            </div>
            <button type="submit" class="btn btn-primary">Log Expense</button>
            <a href="{{ url_for('main.list_expense') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
